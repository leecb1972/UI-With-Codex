<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f4ee" />
    <title>Paper — Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Notes list">
        <div class="sidebar-actions">
          <button class="icon-button mobile-close" type="button" aria-label="Close notes">×</button>
          <button class="new-note" id="new-note" type="button">
            <span aria-hidden="true">＋</span> New note
          </button>
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <span class="sr-only">Search notes</span>
            <input id="search" type="search" placeholder="Search notes" autocomplete="off" />
            <kbd>⌘ K</kbd>
          </label>
        </div>

        <div class="list-heading">
          <span>Notes</span>
          <span id="note-count" aria-live="polite"></span>
        </div>
        <div class="notes-list" id="notes-list"></div>

        <div class="sidebar-footer">
          <button class="theme-toggle" id="theme-toggle" type="button" aria-pressed="false" aria-label="Switch to deep color scheme">
            <span class="theme-toggle-icon" aria-hidden="true"></span>
            <span class="theme-toggle-label">Shallow</span>
          </button>
          <div class="profile-avatar" aria-hidden="true">TL</div>
          <div class="profile-copy"><strong>Tony Li’s workspace</strong><span>Personal</span></div>
          <button class="icon-button" type="button" aria-label="Workspace options">•••</button>
        </div>
      </aside>

      <section class="editor-panel">
        <header class="editor-header">
          <button class="icon-button menu-button" id="menu-button" type="button" aria-label="Open notes">☰</button>
          <div class="save-state" id="save-state"><span></span> Saved</div>
          <div class="editor-actions">
            <button class="text-button" id="duplicate-note" type="button">Duplicate</button>
            <button class="icon-button danger" id="delete-note" type="button" aria-label="Delete note">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M9 7V4h6v3m3 0-1 13H7L6 7m4 4v5m4-5v5" /></svg>
            </button>
          </div>
        </header>

        <div class="editor-scroll">
          <article class="editor" id="editor">
            <div class="date-line" id="note-date"></div>
            <input class="title-input" id="note-title" aria-label="Note title" placeholder="Untitled note" />
            <textarea class="body-input" id="note-body" aria-label="Note content" placeholder="Start writing…"></textarea>
          </article>
        </div>

        <footer class="status-bar">
          <span id="word-count">0 words</span>
          <span class="shortcut-hint"><kbd>⌘</kbd><kbd>N</kbd> new note</span>
        </footer>
      </section>
    </main>
    <div class="scrim" id="scrim"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
